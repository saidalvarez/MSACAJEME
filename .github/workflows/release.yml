name: 'MSA Cajeme - Build & Release'

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: npm ci
        
      # Build the Express backend sidecar
      - name: Install server dependencies
        run: |
          cd server
          npm ci
          
      - name: Build server sidecar
        run: npm run build:sidecar

      # Build the Tauri app with updater artifacts
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MSA Cajeme ${{ github.ref_name }}'
          releaseBody: 'Actualización automática del sistema MSA Cajeme Enterprise.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
